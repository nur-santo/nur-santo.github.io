<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portofolio Saya</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #0f172a;
    color: #e2e8f0;
}

/* HEADER */
header {
    padding: 20px 40px;
    background: #020617;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

header h1 {
    color: #38bdf8;
}

nav a {
    margin-left: 20px;
    text-decoration: none;
    color: #cbd5f5;
    transition: 0.3s;
}

nav a:hover {
    color: #38bdf8;
}

/* HERO */
.hero {
    padding: 80px 20px;
    text-align: center;
}

.hero h2 {
    font-size: 36px;
}

.hero p {
    color: #94a3b8;
    margin-top: 10px;
}

/* PROJECT */
.projects {
    padding: 40px 20px;
    max-width: 1100px;
    margin: auto;
}

.projects h2 {
    margin-bottom: 40px; /* tadinya 20px → jadi lebih lega */
    text-align: center;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
}

.card {
    background: #020617;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #1e293b;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px);
    border-color: #38bdf8;
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    display: block;
    aspect-ratio: 16/9;
    height: auto;
}

.card-content {
    padding: 20px;
}

.card h3 {
    margin-bottom: 10px;
}

.card p {
    font-size: 14px;
    color: #94a3b8;
}

.card a {
    display: inline-block;
    margin-top: 12px;
    color: #38bdf8;
    text-decoration: none;
    font-weight: bold;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    margin-top: 40px;
    background: #020617;
    color: #64748b;
}

/* RESPONSIVE */
@media(max-width: 600px) {
    header {
        flex-direction: column;
    }

    nav {
        margin-top: 10px;
    }
}
</style>
</head>

<body>
    
<section class="projects" id="projects">
    <h2>Proyek Saya</h2>

    <div class="grid">

        <div class="card">
            <img src="https://raw.githubusercontent.com/nur-santo/absensi-admin/master/img/dashboard.png" alt="Admin">
            <div class="card-content">
                <h3>Aplikasi Absensi Admin</h3>
                <p>Dashboard admin sekaligus server backend untuk mengelola data absensi.</p>
                <a href="https://github.com/nur-santo/absensi-admin">Lihat Proyek</a>
            </div>
        </div>

        <div class="card">
            <img src="https://raw.githubusercontent.com/nur-santo/absensi-user/master/img/home.jpg" alt="User">
            <div class="card-content">
                <h3>Aplikasi Absensi Pengguna</h3>
                <p>Aplikasi mobile yang terhubung dengan backend untuk absensi.</p>
                <a href="https://github.com/nur-santo/absensi-user">Lihat Proyek</a>
            </div>
        </div>

    </div>
</section>



</body>
</html>
